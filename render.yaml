# ============================================================
# Déploiement Render (plan gratuit) — Portfolio Gregory Baudin
# ============================================================
services:
  - type: web
    name: portfolio-gregory-baudin
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false # À définir dans le dashboard Render (mot de passe admin initial)
      - key: ADMIN_PATH
        sync: false # URL secrète de la page admin — OBLIGATOIRE en production, à définir dans le dashboard Render (ne jamais la committer)
